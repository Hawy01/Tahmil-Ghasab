name: Build Ghasab APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install Dependencies
        run: pip install flet yt-dlp google-genai

      - name: Download FFmpeg for Android
        run: |
          mkdir -p assets
          # تحميل النسخة الأكثر استقراراً ومجربة (arm64-v8a)
          curl -Lf https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/2018-04-08/arm64-v8a-full.tar.bz2 -o ffmpeg.tar.bz2
          
          # فك الضغط (استخدام -xjf للملفات .bz2)
          tar -xjf ffmpeg.tar.bz2 -C assets --strip-components=1
          chmod +x assets/ffmpeg
          echo "✅ تم تحميل FFmpeg بنجاح. حجم الملف:" && ls -lh assets/ffmpeg

      - name: Inject Legacy Storage to Manifest
        run: |
          find . -name "AndroidManifest.xml" -exec sed -i 's/<application/<application android:requestLegacyExternalStorage="true"/g' {} +

      - name: Build APK
        run: yes | flet build apk

      - name: Send APK to Telegram
        run: |
          curl -v -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F "document=@$(find build/apk/ -name "*.apk")" \
               -F "caption=🚀 تمت المهمة غصب! تم بناء التطبيق مع FFmpeg بنجاح." \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
