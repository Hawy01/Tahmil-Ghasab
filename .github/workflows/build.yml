      - name: Send Download Link to Telegram
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/downloader_android.apk"
          MESSAGE="🚀 <b>تم البناء بنجاح!</b>%0A🔗 <a href='$DOWNLOAD_URL'>اضغط هنا لتحميل التطبيق</a>"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
               -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
               -d "text=$MESSAGE" \
               -d "parse_mode=HTML"
