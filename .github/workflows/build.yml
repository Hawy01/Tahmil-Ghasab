name: Build Ghasab APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          pip install flet yt-dlp google-genai

      - name: Download FFmpeg for Android
        run: |
          mkdir -p assets
          # تحميل نسخة FFmpeg مخصصة لمعالجات الأندرويد (arm64) [استنتاج]
          curl -L https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/v4.4.1/ffmpeg-android-arm64.tar.gz | tar xz -C assets
          chmod +x assets/ffmpeg

      - name: Inject Legacy Storage to Manifest
        run: |
          find . -name "AndroidManifest.xml" -exec sed -i 's/<application/<application android:requestLegacyExternalStorage="true"/g' {} +

      - name: Build APK
        run: yes | flet build apk

      - name: Send APK to Telegram
        run: |
          curl -v -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F "document=@$(find build/apk/ -name "*.apk")" \
               -F "caption=🚀 تم إصلاح الخطأ وبناء 'تحميل غصب' بنجاح!" \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
