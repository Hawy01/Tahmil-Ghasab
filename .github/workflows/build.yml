name: Build Ghasab APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install Dependencies
        run: pip install flet yt-dlp

      - name: Patch flet AndroidManifest template (permissions + legacyStorage)
        run: |
          TEMPLATE=$(python -c "import flet; import os; print(os.path.dirname(flet.__file__))")
          echo "Flet template dir: $TEMPLATE"
          find "$TEMPLATE" -name "AndroidManifest.xml*" | while read f; do
            echo "Patching: $f"
            python3 - "$f" <<'PYEOF'
          import sys, re

          path = sys.argv[1]
          with open(path, 'r', encoding='utf-8') as fh:
              content = fh.read()

          PERMS = """    <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>
          """

          # حقن الصلاحيات قبل <application إن لم تكن موجودة
          if 'MANAGE_EXTERNAL_STORAGE' not in content:
              content = re.sub(r'(<application\s)', PERMS + r'\n    \1', content, count=1)

          # إضافة requestLegacyExternalStorage
          if 'requestLegacyExternalStorage' not in content:
              content = content.replace('<application ', '<application android:requestLegacyExternalStorage="true" ', 1)

          with open(path, 'w', encoding='utf-8') as fh:
              fh.write(content)
          print("Done:", path)
          PYEOF
          done

      - name: Build APK
        run: yes | flet build apk

      - name: Verify APK permissions
        run: |
          APK=$(find build/apk -name "*.apk" | head -1)
          echo "APK: $APK"
          if command -v aapt &>/dev/null; then
            aapt dump permissions "$APK" || true
          fi
          # استخراج AndroidManifest.xml من APK
          python3 -c "
          import zipfile, sys
          apk = sys.argv[1]
          with zipfile.ZipFile(apk) as z:
              names = z.namelist()
              print('APK files:', [n for n in names if 'Manifest' in n or 'manifest' in n])
          " "$APK" || true

      - name: Upload to GitHub Releases
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "إصدار تحميل غصب رقم ${{ github.run_number }}"
          files: build/apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Download Link to Telegram
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/downloader_android.apk"
          MESSAGE="🚀 <b>تم بناء تطبيق تحميل غصب بنجاح!</b>%0A%0A📦 <b>الحجم:</b> كبير (أكثر من 50MB)%0A🔗 <a href='$DOWNLOAD_URL'>اضغط هنا لتحميل التطبيق مباشرة</a>"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
               -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
               -d "text=$MESSAGE" \
               -d "parse_mode=HTML"
